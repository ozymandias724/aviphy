name: Publish to NPM

on:
  workflow_dispatch:

  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Bun runtime
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # Setup Node.js
      #
      # Required for npm publishing.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Install project dependencies
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Runtime scratch space used by
      # integration conversion tests.
      #
      # fixtures/ is tracked in git
      # tmp/ is intentionally ephemeral
      - name: Create tmp directory
        run: mkdir -p tmp

      # Run full test suite.
      #
      # Tests should validate the bundled
      # platform binary rather than a
      # system-installed avifenc.
      - name: Run tests
        run: bun test --timeout 15000

      # Build distributable package
      - name: Build package
        run: bun run build

      # Ensure pushed git tag matches
      # package.json version.
      #
      # Example:
      #   tag: v0.3.5
      #   package.json: 0.3.5
      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          FILE_VERSION=$(node -p "require('./package.json').version")

          if [ "$VERSION" != "$FILE_VERSION" ]; then
            echo "Version mismatch:"
            echo "tag=$VERSION"
            echo "package.json=$FILE_VERSION"
            exit 1
          fi

      # Publish package to npm.
      #
      # Requires repository secret:
      #   NPM_TOKEN
      - name: Publish to NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
