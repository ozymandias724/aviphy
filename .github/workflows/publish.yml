name: Publish to NPM

on:
  workflow_dispatch:

  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Bun runtime
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # Setup Node.js
      #
      # Required for npm Trusted Publishing
      # and provenance generation.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Install project dependencies
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Runtime scratch space used by
      # integration conversion tests
      #
      # fixtures/ is tracked in git
      # tmp/ is intentionally ephemeral
      - name: Create tmp directory
        run: mkdir -p tmp

      # Install avifenc
      #
      # Ubuntu runners provide libavif-bin
      # through apt packages.
      - name: Install libavif
        run: |
          sudo apt-get update
          sudo apt-get install -y libavif-bin

      # Validate encoder availability
      - name: Verify avifenc
        run: avifenc --version

      # Run full test suite
      - name: Run tests
        run: bun test --timeout 15000

      # Build distributable package
      - name: Build package
        run: bun run build

      # Ensure pushed git tag matches
      # package.json version.
      #
      # Example:
      #   tag: v0.3.0
      #   package.json: 0.3.0
      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          FILE_VERSION=$(node -p "require('./package.json').version")

          if [ "$VERSION" != "$FILE_VERSION" ]; then
            echo "Version mismatch:"
            echo "tag=$VERSION"
            echo "package.json=$FILE_VERSION"
            exit 1
          fi

      # Verify GitHub has exposed
      # an OIDC identity token.
      #
      # Trusted Publishing cannot work
      # without this.
      - name: Verify OIDC available
        run: |
          echo "OIDC URL present:"
          test -n "$ACTIONS_ID_TOKEN_REQUEST_URL" && echo "yes" || echo "no"

      # Publish package to npm using
      # Trusted Publishing (OIDC).
      #
      # No npm token required.
      - name: Publish to NPM
        run: npm publish --access public --provenance
