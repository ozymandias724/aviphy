name: Test

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # Install Bun runtime
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # Install JS dependencies
      - name: Install dependencies
        run: bun install

      # Runtime scratch space for tests
      - name: Create tmp directory
        run: mkdir -p tmp

      # Install avifenc (Ubuntu)
      - name: Install libavif (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libavif-bin

      # Install avifenc (macOS)
      - name: Install libavif (macOS)
        if: runner.os == 'macOS'
        run: brew install libavif

      
      # Run test suite
      - name: Run tests
        run: bun test
