name: Test

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # Install Bun runtime
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # Install JS dependencies
      - name: Install dependencies
        run: bun install

      # Runtime scratch space for tests
      - name: Create tmp directory
        run: mkdir -p tmp

      # Install avifenc (Ubuntu)
      - name: Install libavif (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libavif-bin

      # Install avifenc (macOS)
      - name: Install libavif (macOS)
        if: runner.os == 'macOS'
        run: brew install libavif

      # Install avifenc (Windows)
      #
      # Windows package manager support for
      # avifenc is inconsistent, so directly
      # install upstream binaries for now.
      - name: Install libavif (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/AOMediaCodec/libavif/releases/download/v1.4.2/windows-artifacts.zip" `
            -OutFile "libavif.zip"

          Expand-Archive `
            -Path "libavif.zip" `
            -DestinationPath "C:\libavif"

          Add-Content `
            -Path $env:GITHUB_PATH `
            -Value "C:\libavif\bin"

      # Verify libavif extraction (Windows)
      - name: Verify libavif extraction
        if: runner.os == 'Windows'
        shell: pwsh
        run: ls -Force C:\libavif\bin

      # Validate encoder availability
      - name: Verify avifenc
        run: avifenc --version

      # Run test suite
      - name: Run tests
        run: bun test
