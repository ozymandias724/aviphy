name: Test

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # Install Bun runtime
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # Install project dependencies
      - name: Install dependencies
        run: bun install

      # Runtime scratch space used by
      # integration conversion tests
      #
      # fixtures/ is tracked in git
      # tmp/ is intentionally ephemeral
      - name: Create tmp directory
        run: mkdir -p tmp

      # Run full test suite
      - name: Run tests
        run: bun test --timeout 15000
